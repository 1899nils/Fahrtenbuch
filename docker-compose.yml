services:
  # 1. Backend (Node.js/Express)
  backend:
    build: ./backend
    container_name: fahrtenbuch-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/fahrtenbuch
      - PORT=3000
    networks:
      - internal-net
    depends_on:
      db:
        condition: service_healthy

  # 2. Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: fahrtenbuch-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - internal-net
      - proxy-net

  # 3. Database (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: fahrtenbuch-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fahrtenbuch
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fahrtenbuch"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. Reverse Proxy (Nginx Proxy Manager)
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: fahrtenbuch-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net

networks:
  internal-net:
    driver: bridge
  proxy-net:
    driver: bridge

volumes:
  db-data:
  npm-data:
  npm-letsencrypt:
